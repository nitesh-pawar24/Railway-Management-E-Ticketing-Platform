<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Class</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="container">
        <h2>Select Your Class</h2>
        
        <div id="trainDetails" class="form-group" style="background: #eee; padding: 15px; border-radius: 4px;">
            <p>Loading train details...</p>
        </div>

        <form id="classForm">
            <div class="form-group">
                <label>Please choose a class:</label>
                
                <div id="classOptions">
                    <p>Loading classes...</p>
                </div>
            </div>
            
            <button type="submit">Next: View Ticket</button>
        </form>
    </div>

    <script src="class.js"></script>
</body>
</html>
