<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find My Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="findTicketsForm">
            <h2>👤 Find My Bookings</h2>
            <p>Enter your first name and any previous Ticket ID to find all your bookings.</p>
            
            <div class="form-group">
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" placeholder="e.g., Bro" required>
            </div>
            
            <div class="form-group">
                <label for="ticket_id">Ticket ID:</label>
                <input type="number" id="ticket_id" name="ticket_id" placeholder="e.g., 1" required>
            </div>

            <button type="submit">Find My Tickets</button>
        </form>
    </div>
    
    <script src="view_ticket.js"></script>
</body>
</html>
